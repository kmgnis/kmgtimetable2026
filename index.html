    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주차별 학급 시간표</title>
    <style>
        body {
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            background-color: #f4f7f6;
            color: #333;
            text-align: center;
            padding: 20px;
        }
        h1 {
            color: #2c3e50;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        select {
            padding: 10px;
            font-size: 16px;
            border-radius: 5px;
            border: 1px solid #ccc;
            cursor: pointer;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 15px;
            text-align: center;
        }
        th {
            background-color: #3498db;
            color: white;
            font-weight: bold;
        }
        td {
            background-color: #fafafa;
            font-size: 18px;
            transition: background-color 0.3s;
        }
        td:hover {
            background-color: #e8f4f8;
            font-weight: bold;
        }
    </style>
</head>

        function updateTable() {
            const selectedWeek = document.getElementById("weekSelect").value;
            const selectedClass = document.getElementById("classSelect").value;
            
            // 선택된 주차와 학급의 데이터를 가져옵니다.
            const data = timetableData[selectedWeek][selectedClass];
            const tbody = document.getElementById("timetableBody");
            
            tbody.innerHTML = ""; // 기존 표 내용 초기화

            data.forEach((row, index) => {
                let tr = document.createElement("tr");
                
                // 교시 열 추가
                let periodTd = document.createElement("td");
                periodTd.innerHTML = `<strong>${index + 1}교시</strong>`;
                periodTd.style.backgroundColor = "#ecf0f1";
                tr.appendChild(periodTd);

                // 과목 열 추가
                row.forEach(subject => {
                    let td = document.createElement("td");
                    td.textContent = subject;
                    
                    // 특정 과목(예: 행사, 휴일) 강조 효과 예시
                    if(subject === "자율" || subject === "행사" || subject === "휴일") {
                        td.style.color = "#e74c3c";
                        td.style.fontWeight = "bold";
                    }

                    tr.appendChild(td);
                });

                tbody.appendChild(tr);
            });
        }

        // 페이지 로드 시 1-1반 시간표를 기본으로 표시
        window.onload = updateTable;
    </script>
